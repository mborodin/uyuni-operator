---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: autoinstallprofiles.uyuni.uyuni-project.org
spec:
  group: uyuni.uyuni-project.org
  names:
    kind: AutoinstallProfile
    listKind: AutoinstallProfileList
    plural: autoinstallprofiles
    singular: autoinstallprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.label
      name: Label
      type: string
    - jsonPath: .status.distributionLabel
      name: Distribution
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              childChannelRefs:
                description: ChildChannelRefs lists software channels to subscribe
                  the system to during installation.
                items:
                  description: |-
                    LocalObjectRef is a name-only reference to a CR in the same namespace.
                    We deliberately don't include namespace or kind: cross-namespace refs
                    complicate RBAC and aren't needed in our model, and each ref's kind is
                    implied by the field where it appears.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              distributionRef:
                description: |-
                  DistributionRef references the AutoinstallDistribution providing the OS tree.
                  Required and immutable in Managed mode; must be empty in External mode
                  (the tree is Cobbler-only and read from the observed profile).
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              kickstartContents:
                description: |-
                  KickstartContents is the full kickstart/AutoYaST file provided inline.
                  When set, the reconciler calls kickstart.importFile instead of kickstart.createProfile.
                  Mutually exclusive with Scripts (webhook enforces).
                type: string
              kickstartHost:
                description: |-
                  KickstartHost is the Uyuni server hostname embedded in the kickstart file URL.
                  Defaults to the Uyuni server's configured hostname when empty.
                type: string
              label:
                description: Label is the Cobbler profile label. Immutable after creation.
                pattern: ^[a-z0-9][a-z0-9._-]*$
                type: string
              mode:
                default: Managed
                description: |-
                  Mode selects how the operator manages the Cobbler profile.
                    Managed:  the operator creates/updates/deletes the profile.
                    External: the operator only observes an existing Uyuni-created (Cobbler)
                              profile — it never creates, mutates, or deletes it. Used for
                              profiles Uyuni auto-creates during PXE/OS-image builds.
                  Immutable after creation.
                enum:
                - Managed
                - External
                type: string
              organizationRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              preserveKsFile:
                description: 'PreserveKsFile: if true, saves the kickstart file to
                  /root/ks.cfg after install.'
                type: boolean
              rootPasswordSecretRef:
                description: |-
                  RootPasswordSecretRef references a Secret in the same namespace containing the
                  root account password set during installation. Required in Managed mode;
                  must be empty in External mode.
                properties:
                  key:
                    type: string
                  name:
                    type: string
                required:
                - key
                - name
                type: object
              scripts:
                description: |-
                  Scripts are pre/post installation scripts added to the profile.
                  Each script's Name field is the reconcile key.
                  Mutually exclusive with KickstartContents — ignored when KickstartContents is set.
                items:
                  description: AutoinstallScriptSpec describes a pre or post installation
                    script added to the profile.
                  properties:
                    chroot:
                      description: 'Chroot: if true, post scripts run chrooted to
                        the installed system.'
                      type: boolean
                    contents:
                      description: Contents is the full script body.
                      type: string
                    errorOnFail:
                      description: 'ErrorOnFail: if true, installation aborts if the
                        script exits non-zero.'
                      type: boolean
                    interpreter:
                      default: /bin/bash
                      description: Interpreter is the script interpreter path.
                      type: string
                    name:
                      description: Name uniquely identifies this script within the
                        profile. Used as reconcile key.
                      type: string
                    template:
                      description: 'Template: if true, the script is rendered as a
                        Cobbler template before execution.'
                      type: boolean
                    type:
                      description: 'Type controls when the script runs: pre (before
                        install) or post (after install).'
                      enum:
                      - pre
                      - post
                      type: string
                  required:
                  - contents
                  - name
                  - type
                  type: object
                type: array
              updateType:
                default: all
                description: UpdateType controls whether packages are updated during
                  installation.
                enum:
                - all
                - none
                type: string
              variables:
                additionalProperties:
                  type: string
                description: |-
                  Variables are Cobbler template variables substituted into the kickstart file.
                  Ignored when KickstartContents is set.
                type: object
              virtualizationType:
                default: none
                description: VirtualizationType controls Cobbler's virtualization
                  support for this profile.
                enum:
                - none
                - qemu
                - para_host
                - xenpv
                - xenfv
                type: string
            required:
            - label
            - organizationRef
            type: object
            x-kubernetes-validations:
            - message: distributionRef is required when mode is Managed
              rule: self.mode != 'Managed' || has(self.distributionRef)
            - message: rootPasswordSecretRef is required when mode is Managed
              rule: self.mode != 'Managed' || has(self.rootPasswordSecretRef)
            - message: distributionRef must not be set when mode is External (the
                tree is Cobbler-only)
              rule: self.mode != 'External' || !has(self.distributionRef)
            - message: rootPasswordSecretRef must not be set when mode is External
              rule: self.mode != 'External' || !has(self.rootPasswordSecretRef)
            - message: kickstartContents, scripts, childChannelRefs and variables
                must not be set when mode is External
              rule: self.mode != 'External' || (!has(self.kickstartContents) && (!has(self.scripts)
                || size(self.scripts) == 0) && (!has(self.childChannelRefs) || size(self.childChannelRefs)
                == 0) && (!has(self.variables) || size(self.variables) == 0))
          status:
            properties:
              childChannelLabels:
                description: ChildChannelLabels is the realized list of child channel
                  labels.
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              contentsHash:
                description: |-
                  ContentsHash is the SHA-256 hex digest of spec.kickstartContents.
                  Used to detect changes and avoid re-importing an identical file.
                type: string
              distributionLabel:
                description: |-
                  DistributionLabel is the resolved Cobbler tree label. In Managed mode it is
                  resolved from spec.distributionRef; in External mode it is the observed
                  profile's tree_label.
                type: string
              external:
                description: |-
                  External is true when the realized profile is observed (External mode),
                  not managed by the operator.
                type: boolean
              observedGeneration:
                format: int64
                type: integer
              scriptIds:
                description: ScriptIDs tracks Uyuni-assigned script IDs keyed by script
                  Name.
                items:
                  description: ProfileScriptStatus records the Uyuni-assigned ID for
                    a reconciled script.
                  properties:
                    name:
                      description: Name matches AutoinstallScriptSpec.Name and is
                        used as the reconcile key.
                      type: string
                    uyuniId:
                      description: UyuniID is the Uyuni-assigned script ID used to
                        update or remove the script.
                      type: integer
                  required:
                  - name
                  - uyuniId
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
