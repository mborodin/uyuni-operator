---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: imageprofiles.uyuni.uyuni-project.org
spec:
  group: uyuni.uyuni-project.org
  names:
    kind: ImageProfile
    listKind: ImageProfileList
    plural: imageprofiles
    singular: imageprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.label
      name: Label
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.lastBuild.status
      name: LastBuild
      type: string
    - jsonPath: .status.bootImage
      name: BootImage
      type: string
    - jsonPath: .status.lastBuild.completedAt
      name: BuildTime
      type: date
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              activationKeyRef:
                description: ActivationKeyRef references the ActivationKey CR whose
                  realized key is passed to Uyuni.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              auth:
                description: |-
                  Auth injects username/password Basic Auth into the source URL (URL or Git.Repository)
                  at reconcile time. Credentials are read from the named Secret and never stored in status.
                properties:
                  name:
                    description: Name is the Secret in the same namespace.
                    type: string
                  passwordKey:
                    default: password
                    description: PasswordKey is the key for the password value. Defaults
                      to "password".
                    type: string
                  usernameKey:
                    default: username
                    description: UsernameKey is the key for the username value. Defaults
                      to "username".
                    type: string
                required:
                - name
                type: object
              buildHostRef:
                description: BuildHostRef references the System CR to use as the build
                  host.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              buildPolicy:
                default: manual
                description: |-
                  BuildPolicy controls automatic builds:
                    - "manual":   only AnnBuildNow annotation triggers a build
                    - "onChange": rebuild when spec generation changes
                type: string
              customInfo:
                additionalProperties:
                  type: string
                type: object
              git:
                description: |-
                  Git is a structured git source. Mutually exclusive with URL.
                  Exactly one of URL or Git must be set.
                properties:
                  path:
                    description: |-
                      Path is the subdirectory within the repo containing the Dockerfile or KIWI config.
                      Appended as ":path". Requires Reference to also be set (webhook enforces).
                    type: string
                  reference:
                    description: Reference is the branch, tag, or commit. Appended
                      as "#reference".
                    type: string
                  repository:
                    description: Repository is the base URL of the git repository.
                    type: string
                required:
                - repository
                type: object
              label:
                description: Label is the Uyuni image profile label. Immutable after
                  creation.
                type: string
              organizationRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              storeRef:
                description: |-
                  StoreRef references the ImageStore CR that holds the built image.
                  Required for dockerfile (registry) images; optional for kiwi, where Uyuni
                  auto-selects its OS-image store. The CEL rule on the spec enforces the
                  dockerfile requirement.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              type:
                default: kiwi
                description: Type is the image build type. Immutable after creation.
                enum:
                - kiwi
                - dockerfile
                type: string
              url:
                description: |-
                  URL is the direct source URL for the image build. Mutually exclusive with Git.
                  Exactly one of URL or Git must be set.
                type: string
            required:
            - label
            - organizationRef
            - type
            type: object
            x-kubernetes-validations:
            - message: storeRef is required when type is dockerfile
              rule: self.type != 'dockerfile' || has(self.storeRef)
          status:
            properties:
              bootImage:
                description: |-
                  BootImage is the saltboot boot image identifier of the last successful
                  PXE/OS image build (read from the image pillar), e.g.
                  "BranchServer_MicroOS-0.6.10-4". Reference it from a saltboot formula to
                  PXE-boot systems with this image. Empty for non-bootable images (e.g.
                  container images).
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastBuild:
                properties:
                  buildId:
                    type: integer
                  completedAt:
                    format: date-time
                    type: string
                  failureReason:
                    type: string
                  startedAt:
                    format: date-time
                    type: string
                  status:
                    enum:
                    - Queued
                    - Running
                    - Succeeded
                    - Failed
                    type: string
                  trigger:
                    description: 'What initiated this build: "annotation", "onChange",
                      "initial".'
                    type: string
                  version:
                    type: string
                type: object
              observedGeneration:
                format: int64
                type: integer
              uyuniId:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
