---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: systems.uyuni.uyuni-project.org
spec:
  group: uyuni.uyuni-project.org
  names:
    kind: System
    listKind: SystemList
    plural: systems
    singular: system
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.minionId
      name: MinionID
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.uyuniServerId
      name: UyuniID
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.baseChannelLabel
      name: BaseChannel
      type: string
    - jsonPath: .status.lastCheckinTime
      name: LastCheckin
      type: date
    - jsonPath: .status.conditions[?(@.type=='BuildHost')].status
      name: BuildHost
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              addOns:
                description: |-
                  AddOns are additional entitlements granted to the system, e.g.
                  "virtualization_host", "container_build_host", "osimage_build_host",
                  "ansible_control_node", "monitoring_entitled".
                items:
                  type: string
                type: array
              adoptionTimeout:
                description: 'Defaulted by webhook: 24h if PreCreate, 30m otherwise.'
                type: string
              applyHighState:
                default: true
                description: |-
                  If true, schedule a Salt highstate run (system.scheduleApplyHighstate)
                  the first time the system completes registration and is fully
                  reconciled — applying all assigned states (channels, config channels,
                  formulas, etc.) immediately rather than waiting for the next scheduled
                  highstate.
                type: boolean
              autoinstall:
                description: |-
                  Autoinstall configures Cobbler/Kickstart-based OS provisioning. When set,
                  the reconciler calls system.provisionSystem after the system profile is
                  pre-created (preCreate must also be true for initial provisioning).
                properties:
                  earliest:
                    description: |-
                      Earliest is the earliest time at which to schedule the autoinstall action.
                      Defaults to immediate execution.
                    format: date-time
                    type: string
                  netboot:
                    default: true
                    description: |-
                      Netboot enables PXE netboot on the Cobbler system record — the netboot
                      flag of system.setVariables, matching the UI's "Enable netboot" toggle.
                      Defaults to true. Applied together with Variables (system.setVariables
                      couples the two), so it only takes effect when at least one variable is
                      declared; otherwise createSystemRecord's default (netboot on) stands.
                    type: boolean
                  profile:
                    description: |-
                      Profile is the bare Cobbler/Kickstart profile label registered in Uyuni.
                      Immutable once the first provisioning action has been scheduled.
                      Mutually exclusive with ProfileRef.
                    type: string
                  profileRef:
                    description: |-
                      ProfileRef references an AutoinstallProfile CR in the same namespace.
                      The reconciler resolves spec.label from the CR at runtime.
                      Mutually exclusive with Profile.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  variables:
                    description: |-
                      Variables are per-system Cobbler system-record variables (ks_meta),
                      substituted into the autoinstall template. Each entry sets a literal
                      Value or sources it from a Secret/ConfigMap key (like a pod env var).
                      Applied via system.setVariables when PreCreate is true and at least one
                      variable is declared. IMPORTANT: system.setVariables REPLACES the record's
                      entire ks_meta set, so this must be the COMPLETE authoritative set — any
                      Uyuni-generated key you want to keep (e.g. bootstrap_token, activation_key)
                      must be included here, typically sourced from a Secret. Explicit Variables
                      override keys imported by VariablesFrom.
                    items:
                      description: AutoinstallVariable is one Cobbler ks_meta variable.
                      properties:
                        name:
                          description: Name is the ks_meta variable key.
                          type: string
                        value:
                          description: Value is a literal value. Mutually exclusive with ValueFrom.
                          type: string
                        valueFrom:
                          description: |-
                            ValueFrom sources the value from a Secret or ConfigMap key in the
                            same namespace. Mutually exclusive with Value.
                          properties:
                            configMapKeyRef:
                              description: ConfigMapKeyRef selects a key of a ConfigMap in the same namespace.
                              properties:
                                key:
                                  type: string
                                name:
                                  type: string
                              required:
                              - key
                              - name
                              type: object
                            secretKeyRef:
                              description: SecretKeyRef selects a key of a Secret in the same namespace.
                              properties:
                                key:
                                  type: string
                                name:
                                  type: string
                              required:
                              - key
                              - name
                              type: object
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  variablesFrom:
                    description: |-
                      VariablesFrom bulk-imports every key of the referenced Secrets/ConfigMaps
                      as ks_meta variables (like a pod's envFrom). Sources are applied in order;
                      later sources and explicit Variables override earlier keys.
                    items:
                      description: AutoinstallVariableSource bulk-imports all keys of a Secret or ConfigMap.
                      properties:
                        configMapRef:
                          description: ConfigMapRef imports all keys from a ConfigMap in the same namespace.
                          properties:
                            name:
                              type: string
                          required:
                          - name
                          type: object
                        prefix:
                          description: Prefix is prepended to each imported variable key.
                          type: string
                        secretRef:
                          description: SecretRef imports all keys from a Secret in the same namespace.
                          properties:
                            name:
                              type: string
                          required:
                          - name
                          type: object
                      type: object
                    type: array
                type: object
              baseChannelFrom:
                description: |-
                  ChannelFromProject references a channel produced by a ContentProject
                  environment. Resolution is structural: the realized Uyuni channel label
                  is {project.spec.label}-{environment}-{sourceChannelLabel}.

                  Verification at reconcile time additionally checks the channel exists in
                  the project's status.environmentStates[*].derivedChannels, which catches
                  the case where sourceChannelLabel names a channel that isn't actually a
                  source of the project.
                properties:
                  contentProjectRef:
                    description: |-
                      ContentProjectRef is optional. When its name is empty, no content
                      project channel is attached and resolution is skipped (the resource
                      reconciles without a project-derived channel) rather than erroring.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  environment:
                    description: Environment is optional; required only when ContentProjectRef
                      is set.
                    pattern: ^[a-z0-9-]+$
                    type: string
                  sourceChannelLabel:
                    description: |-
                      SourceChannelLabel is the channel label as it exists upstream of the
                      project (i.e., what's attached as a source), not the derived label.
                    type: string
                required:
                - sourceChannelLabel
                type: object
              baseChannelRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              childChannelRefs:
                items:
                  description: |-
                    LocalObjectRef is a name-only reference to a CR in the same namespace.
                    We deliberately don't include namespace or kind: cross-namespace refs
                    complicate RBAC and aren't needed in our model, and each ref's kind is
                    implied by the field where it appears.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              childChannelsFrom:
                items:
                  description: |-
                    ChannelFromProject references a channel produced by a ContentProject
                    environment. Resolution is structural: the realized Uyuni channel label
                    is {project.spec.label}-{environment}-{sourceChannelLabel}.

                    Verification at reconcile time additionally checks the channel exists in
                    the project's status.environmentStates[*].derivedChannels, which catches
                    the case where sourceChannelLabel names a channel that isn't actually a
                    source of the project.
                  properties:
                    contentProjectRef:
                      description: |-
                        ContentProjectRef is optional. When its name is empty, no content
                        project channel is attached and resolution is skipped (the resource
                        reconciles without a project-derived channel) rather than erroring.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    environment:
                      description: Environment is optional; required only when ContentProjectRef
                        is set.
                      pattern: ^[a-z0-9-]+$
                      type: string
                    sourceChannelLabel:
                      description: |-
                        SourceChannelLabel is the channel label as it exists upstream of the
                        project (i.e., what's attached as a source), not the derived label.
                      type: string
                  required:
                  - sourceChannelLabel
                  type: object
                type: array
              configChannelRefs:
                description: |-
                  ConfigChannelRefs lists config channels subscribed directly to this system,
                  in priority order (index 0 = highest). These always outrank channels
                  inherited from spec.groupRefs.
                items:
                  description: |-
                    LocalObjectRef is a name-only reference to a CR in the same namespace.
                    We deliberately don't include namespace or kind: cross-namespace refs
                    complicate RBAC and aren't needed in our model, and each ref's kind is
                    implied by the field where it appears.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              contactMethod:
                default: default
                description: ContactMethod controls how the Uyuni server communicates
                  with this system.
                enum:
                - default
                - ssh-push
                - ssh-push-tunnel
                type: string
              customInfoValues:
                description: |-
                  CustomInfoValues sets organization-defined custom info key/value pairs on
                  the system. Each entry references a CustomInfoKey CR (which guarantees the
                  key exists in Uyuni before a value is set) and supplies the value.
                items:
                  description: CustomInfoValue assigns a value to an organization
                    custom info key.
                  properties:
                    keyRef:
                      description: KeyRef references a CustomInfoKey CR in the same
                        namespace.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    value:
                      description: Value is the custom info value for the referenced
                        key.
                      type: string
                  required:
                  - keyRef
                  - value
                  type: object
                type: array
              deletionPolicy:
                default: Orphan
                enum:
                - Orphan
                - Delete
                type: string
              description:
                type: string
              formulas:
                description: Formulas enables Salt formulas on the system and supplies
                  their form data.
                items:
                  description: FormulaAssignment enables a Salt formula on a system
                    and supplies its form data.
                  properties:
                    name:
                      description: |-
                        Name is the Salt formula name. The formula must be installed on the
                        Uyuni server (formula.listFormulas).
                      type: string
                    values:
                      description: |-
                        Values is the formula form data: arbitrary nested key/value configuration
                        matching the formula's form definition.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  type: object
                type: array
              groupRefs:
                description: |-
                  GroupRefs declares which SystemGroups this system should belong to.
                  The reconciler adds/removes group membership to match this list.
                  Preferred over SystemGroup.spec.memberRefs (system-side declaration).
                items:
                  description: |-
                    LocalObjectRef is a name-only reference to a CR in the same namespace.
                    We deliberately don't include namespace or kind: cross-namespace refs
                    complicate RBAC and aren't needed in our model, and each ref's kind is
                    implied by the field where it appears.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              hostname:
                description: |-
                  Hostname used in the pre-created profile. Defaults to minionId via
                  the SystemDefaulter mutating webhook.
                type: string
              minionId:
                description: Immutable after creation.
                type: string
              network:
                items:
                  properties:
                    ipAddress:
                      type: string
                    macAddress:
                      pattern: ^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$
                      type: string
                    name:
                      type: string
                  required:
                  - macAddress
                  - name
                  type: object
                type: array
              organizationRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              preCreate:
                description: |-
                  If true, create an empty system profile in Uyuni before the system
                  boots, so configuration applies on first registration. Requires at
                  least one of: network[].macAddress, hostname.
                type: boolean
              proxyRef:
                description: |-
                  ProxyRef connects this system through another registered System that is a
                  Uyuni proxy. Clearing it reconnects the system directly to the server.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              type:
                allOf:
                - enum:
                  - pos
                  - storehub
                  - branchserver
                - enum:
                  - pos
                  - storehub
                  - branchserver
                description: SystemType classifies the system role. Optional; omit
                  for generic managed systems.
                type: string
            required:
            - minionId
            - organizationRef
            type: object
          status:
            properties:
              activeAddOns:
                items:
                  type: string
                type: array
              autoinstallRecordLabel:
                description: |-
                  AutoinstallRecordLabel is the Cobbler autoinstall profile label the
                  pre-create system record (system.createSystemRecord) was last created
                  with. Empty until the record is created; used to make record creation
                  idempotent and to detect a changed profile.
                type: string
              activeFormulas:
                description: ActiveFormulas is the set of Salt formulas last enabled
                  on the system.
                items:
                  type: string
                type: array
              autoinstallActionId:
                description: AutoinstallActionID is the Uyuni action ID of the last
                  scheduled provisioning.
                type: integer
              autoinstallStatus:
                description: AutoinstallStatus reflects the Uyuni-side outcome of
                  the last provisioning action.
                enum:
                - Scheduled
                - Completed
                - Failed
                type: string
              baseChannelLabel:
                type: string
              childChannelLabels:
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configChannelLabels:
                description: |-
                  ConfigChannelLabels is the realized ordered config channel subscription
                  (direct refs first, then group-sourced). Used to detect and apply drift.
                items:
                  type: string
                type: array
              groupNames:
                description: |-
                  GroupNames is the set of Uyuni group names the system was last placed in.
                  Used to compute removals on next reconcile.
                items:
                  type: string
                type: array
              lastCheckinTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - PreProvisioned
                - Reprovisioning
                - Registered
                - Reconciled
                type: string
              phaseTransitionTime:
                description: PhaseTransitionTime records when Phase last changed.
                  Used to enforce AdoptionTimeout.
                format: date-time
                type: string
              proxyActionId:
                description: ProxyActionID is the Uyuni action ID of the last changeProxy
                  action.
                type: integer
              proxyServerId:
                description: |-
                  ProxyServerID is the Uyuni server ID of the proxy the system was last
                  connected through (0 = direct to server).
                type: integer
              uyuniServerId:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
