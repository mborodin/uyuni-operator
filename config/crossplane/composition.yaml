---
# Crossplane Composition — XBrandRegion → individual uyuni-operator CRDs
#
# Architecture:
#   User creates BrandRegionClaim (namespace-scoped)
#     → Crossplane creates XBrandRegion (composite, cluster-scoped)
#       → This Composition creates individual provider-kubernetes Objects
#         → provider-kubernetes creates the actual uyuni operator CRDs
#           → Each uyuni operator controller reconciles against Uyuni API
#
# Naming convention (mirrors what BrandRegionReconciler used to do):
#   UyuniProvider  : {composite.name}
#   Organization   : {composite.name}
#   Repository N   : {composite.name}-{spec.repositories[N].name}
#   SoftwareChannel: {composite.name}-{spec.softwareChannels[N].name}
#   ConfigChannel  : {composite.name}-{spec.configChannels[N].name}
#   SystemGroup    : {composite.name}-{spec.systemGroups[N].name}
#   ActivationKey  : {composite.name}-{spec.activationKeys[N].name}
#   ContentProject : {composite.name}-{spec.contentProjects[0].name}
#   ClmEnvironment : {composite.name}-{spec.contentProjects[0].name}-{env.name}
#
# Assumptions (matches the standard BrandRegionClaim structure):
#   - 2 repositories  (indices 0, 1)
#   - 2 softwareChannels (indices 0=base, 1=updates/child)
#   - 3 configChannels  (indices 0, 1, 2)
#   - 3 systemGroups   (indices 0, 1, 2)
#   - 3 activationKeys (indices 0, 1, 2)
#   - 1 contentProject (index 0) with 3 environments (dev, test, prod)
#
# Prerequisites:
#   - Crossplane installed
#   - provider-kubernetes installed with ProviderConfig named "kubernetes-provider"
#   - XRD applied: config/crossplane/xrd.yaml
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xbrandregion.uyuni.uyuni-project.org
  labels:
    crossplane.io/xrd: xbrandregions.uyuni.uyuni-project.org
spec:
  compositeTypeRef:
    apiVersion: uyuni.uyuni-project.org/v1alpha1
    kind: XBrandRegion
  resources:

    # ─────────────────────────────────────────────────────────────────────────────
    # 1. UyuniProvider  (cluster-scoped — no namespace in manifest metadata)
    #    Named: {composite.name}
    # ─────────────────────────────────────────────────────────────────────────────
    - name: uyuniprovider
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: kubernetes-provider
          forProvider:
            manifest:
              apiVersion: uyuni.uyuni-project.org/v1alpha1
              kind: UyuniProvider
              spec: {}
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.deletionPolicy
          toFieldPath: spec.deletionPolicy
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.provider.url
          toFieldPath: spec.forProvider.manifest.spec.url
        - type: FromCompositeFieldPath
          fromFieldPath: spec.provider.credentialsSecretRef
          toFieldPath: spec.forProvider.manifest.spec.credentialsSecretRef
        - type: FromCompositeFieldPath
          fromFieldPath: spec.provider.insecureSkipVerify
          toFieldPath: spec.forProvider.manifest.spec.insecureSkipVerify
          policy:
            fromFieldPath: Optional
        - type: FromCompositeFieldPath
          fromFieldPath: spec.provider.timeout
          toFieldPath: spec.forProvider.manifest.spec.timeout
          policy:
            fromFieldPath: Optional
        - type: FromCompositeFieldPath
          fromFieldPath: spec.provider.caCertSecretRef
          toFieldPath: spec.forProvider.manifest.spec.caCertSecretRef
          policy:
            fromFieldPath: Optional

    # ─────────────────────────────────────────────────────────────────────────────
    # 2. Organization
    #    Named: {composite.name}
    # ─────────────────────────────────────────────────────────────────────────────
    - name: organization
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: kubernetes-provider
          forProvider:
            manifest:
              apiVersion: uyuni.uyuni-project.org/v1alpha1
              kind: Organization
              metadata:
                namespace: default
              spec: {}
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.deletionPolicy
          toFieldPath: spec.deletionPolicy
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.manifest.metadata.name
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
          toFieldPath: spec.forProvider.manifest.metadata.namespace
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.forProvider.manifest.spec.providerRef.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.organization.name
          toFieldPath: spec.forProvider.manifest.spec.name
        - type: FromCompositeFieldPath
          fromFieldPath: spec.organization.credentialsSecretRef
          toFieldPath: spec.forProvider.manifest.spec.credentialsSecretRef
          policy:
            fromFieldPath: Optional
        - type: FromCompositeFieldPath
          fromFieldPath: spec.organization.import
          toFieldPath: spec.forProvider.manifest.spec.import
          policy:
            fromFieldPath: Optional

    # ─────────────────────────────────────────────────────────────────────────────
    # 3. Repository 0
    #    Named: {composite.name}-{spec.repositories[0].name}
    # ─────────────────────────────────────────────────────────────────────────────
    - name: repository-0
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
