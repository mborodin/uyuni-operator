        - type: FromCompositeFieldPath
          fromFieldPath: spec.repositories[0].spec.label
          toFieldPath: spec.forProvider.manifest.spec.label
        - type: FromCompositeFieldPath
          fromFieldPath: spec.repositories[0].spec.url
          toFieldPath: spec.forProvider.manifest.spec.url
        - type: FromCompositeFieldPath
          fromFieldPath: spec.repositories[0].spec.type
          toFieldPath: spec.forProvider.manifest.spec.type
          policy:
            fromFieldPath: Optional
        - type: FromCompositeFieldPath
          fromFieldPath: spec.repositories[0].spec.hasSignedMetadata
          toFieldPath: spec.forProvider.manifest.spec.hasSignedMetadata
