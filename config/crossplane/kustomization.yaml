---
# Kustomization for Crossplane integration
#
# This deploys:
# 1. XRD (XBrandRegion) - defines the composite resource
# 2. Composition - maps XBrandRegion to individual uyuni-operator CRDs
# 3. provider-kubernetes - Crossplane provider for managing K8s resources
#
# Prerequisites:
# - Crossplane must be installed: kubectl apply -f https://releases.crossplane.io/release/v1.14.0/install.yaml
# - provider-kubernetes must be installed via Crossplane package manager
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- xrd.yaml
- composition.yaml
- provider-kubernetes.yaml
