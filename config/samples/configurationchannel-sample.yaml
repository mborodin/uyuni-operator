apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: ConfigurationChannel
metadata:
  name: nginx-config
  namespace: linux-platform
spec:
  id: nginx-config-state
  name: Nginx Configuration (state)
  type: state
  description: Salt state channel for Nginx configuration management
  url: https://github.com/example/salt-nginx-config
---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: ConfigurationChannel
metadata:
  name: base-config
  namespace: linux-platform
spec:
  id: base-config-normal
  name: Base System Configuration
  type: normal
  description: Base system configuration management
---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: ConfigurationChannel
metadata:
  name: apache-config
  namespace: linux-platform
spec:
  id: apache-config-state
  name: Apache Configuration
  type: state
  description: Apache web server configuration management