# SoftwareChannel Sample - Package Repository Channels
# Apply with: kubectl apply -f config/samples/softwarechannel-sample.yaml

# First, create an Organization (required for SoftwareChannels)
---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: Organization
metadata:
  name: pantheon-of-goods
  namespace: linux-platform
spec:
  name: Pantheon of Goods
  providerRef:
    name: rke                                        # Reference to UyuniProvider

---
# Then, create a Repository resource pointing to the package mirror
---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: Repository
metadata:
  name: opensuse-leap-15-6-oss
  namespace: linux-platform
spec:
  label: opensuse_leap15_6-oss-repo
  url: http://download.opensuse.org/distribution/leap/15.6/repo/oss/
  type: yum
  organizationRef:
    name: pantheon-of-goods

---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: Repository
metadata:
  name: opensuse-leap-15-6-updates
  namespace: linux-platform
spec:
  label: opensuse_leap15_6-updates-repo
  url: http://download.opensuse.org/update/leap/15.6/oss/
  type: yum
  organizationRef:
    name: pantheon-of-goods

---
# Base Software Channel (parent channel)
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: SoftwareChannel
metadata:
  name: opensuse-leap-15-6-x86-64
  namespace: linux-platform
spec:
  label: opensuse_leap15_6-x86_64                    # Unique channel identifier
  name: openSUSE Leap 15.6 (x86_64)                  # Display name
  summary: openSUSE Leap 15.6 base channel           # Brief description
  arch: channel-x86_64                               # Architecture
  organizationRef:
    name: pantheon-of-goods                          # Reference to Organization
  repositoryRefs:
    - name: opensuse-leap-15-6-oss                   # Reference to Repository
  sync:
    cron: "0 0 3 ? * *"                              # Sync at 3 AM daily
    syncOnCreate: true                               # Sync immediately after create

---
# Child Channel (updates channel)
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: SoftwareChannel
metadata:
  name: opensuse-leap-15-6-updates-x86-64
  namespace: linux-platform
spec:
  label: opensuse_leap15_6-updates-x86_64            # Unique channel identifier
  name: openSUSE Leap 15.6 Updates (x86_64)          # Display name
  summary: Security and bugfix updates for Leap 15.6 # Description
  arch: channel-x86_64                               # Architecture
  organizationRef:
    name: pantheon-of-goods                          # Reference to Organization
  parentChannelRef:                                  # Reference to parent channel resource
    name: opensuse-leap-15-6-x86-64                  # Name of parent SoftwareChannel
  repositoryRefs:
    - name: opensuse-leap-15-6-updates               # Reference to Repository
  sync:
    cron: "0 0 3 ? * *"                              # Sync at 3 AM daily
    syncOnCreate: true                               # Sync immediately after create

---
# Example: Red Hat Enterprise Linux Base Channel
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: Repository
metadata:
  name: rhel-8-baseos
  namespace: linux-platform
spec:
  label: rhel-8-baseos-repo
  url: http://mirror.example.com/rhel/8/BaseOS/x86_64/
  type: yum
  organizationRef:
    name: pantheon-of-goods

---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: SoftwareChannel
metadata:
  name: rhel-8-x86-64
  namespace: linux-platform
spec:
  label: rhel-8-x86_64
  name: Red Hat Enterprise Linux 8 (x86_64)
  summary: RHEL 8 base channel
  arch: channel-x86_64
  organizationRef:
    name: pantheon-of-goods                          # Reference to Organization
  repositoryRefs:
    - name: rhel-8-baseos
  sync:
    cron: "0 0 2 ? * *"                              # Sync at 2 AM daily
    syncOnCreate: false                             # Don't sync on create (set to true to sync)
