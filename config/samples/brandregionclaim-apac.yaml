apiVersion: v1
kind: Secret
metadata:
  name: belgium-apac-org-creds
  namespace: linux-platform
type: Opaque
stringData:
  username: belgium-dll
  password: belgium-dll
---
apiVersion: uyuni.uyuni-project.org/v1alpha1
kind: BrandRegionClaim
metadata:
  name: delhaize-apac
  namespace: linux-platform
spec:
  brand: delhaize
  region: apac

  provider:
    url: https://rke-uyuni-new.nexa-dev.delhaize.test
    credentialsSecretRef:
      name: uyuni-apac-creds
      namespace: linux-platform
    insecureSkipVerify: true

  organization:
    name: Belgium DLL
    credentialsSecretRef:
      name: belgium-apac-org-creds

  repositories:
    - name: leap-15-6-oss
      spec:
        label: opensuse_leap15_6-apac-x86_64-repo
        url: http://download.opensuse.org/distribution/leap/15.6/repo/oss/
        type: yum
    - name: leap-15-6-updates-oss
      spec:
        label: opensuse_leap15_6-apac-updates-x86_64-repo
        url: http://download.opensuse.org/update/leap/15.6/oss/
        type: yum

  softwareChannels:
    - name: opensuse-leap-15-6-x86-64
      spec:
        label: opensuse_leap15_6-apac-x86_64
        name: openSUSE Leap 15.6 APAC (x86_64)
        summary: openSUSE Leap 15.6 base channel
        arch: channel-x86_64
        repositoryRefs:
          - name: leap-15-6-oss
        sync:
          cron: "0 0 3 ? * *"
          syncOnCreate: true
    - name: opensuse-leap-15-6-updates-x86-64
      spec:
        label: opensuse_leap15_6-apac-updates-x86_64
        name: openSUSE Leap 15.6 APAC Updates (x86_64)
        summary: openSUSE Leap 15.6 update channel
        arch: channel-x86_64
        parentChannelRef:
          name: opensuse-leap-15-6-x86-64
        repositoryRefs:
          - name: leap-15-6-updates-oss
        sync:
          cron: "0 30 3 ? * *"

  configChannels:
    - name: baseline
      spec:
        id: delhaize-apac-baseline
        name: Delhaize APAC Baseline
        description: "Common Salt states for all Delhaize APAC systems"
        type: state

  baseChannelRef:
    name: opensuse-leap-15-6-x86-64
  childChannelRefs:
    - name: opensuse-leap-15-6-updates-x86-64

  stateRepository:
    url: https://github.com/myorg/uyuni-salt-states
    branch: main
    subPath: states/delhaize/apac

  systemGroups:
    - name: branchservers
      description: "Delhaize APAC — Branch Servers"
      systemType: branchserver
      configChannelRefs:
        - name: baseline
    - name: storehubs
      description: "Delhaize APAC — Store Hubs"
      systemType: storehub
      configChannelRefs:
        - name: baseline
    - name: pos
      description: "Delhaize APAC — POS Terminals"
      systemType: pos
      configChannelRefs:
        - name: baseline

  contentProjects:
    - name: leap-platform
      label: dlz-apac-leap-platform
      displayName: Delhaize APAC Leap Platform
      description: "CLM project for openSUSE Leap 15.6 APAC content lifecycle"
      sourceRefs:
        - name: opensuse-leap-15-6-x86-64
        - name: opensuse-leap-15-6-updates-x86-64
      environments:
        - name: dev
          id: dev
          displayName: Development
          description: "Latest content — not production-ready"
        - name: test
          id: test
          displayName: Testing
          description: "Validated content for QA"
          predecessor: dev
        - name: prod
          id: prod
          displayName: Production
          description: "Promoted and approved content"
          predecessor: test

  activationKeys:
    - name: branchserver
      description: "Delhaize APAC branchserver registration key"
      entitlements:
        - monitoring_entitled
      systemGroupRefs:
        - name: branchservers
    - name: storehub
      description: "Delhaize APAC storehub registration key"
      entitlements:
        - monitoring_entitled
      systemGroupRefs:
        - name: storehubs
    - name: pos
      description: "Delhaize APAC POS registration key"
      entitlements:
        - monitoring_entitled
      systemGroupRefs:
        - name: pos
