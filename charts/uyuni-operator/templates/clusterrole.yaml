apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "uyuni-operator.fullname" . }}-manager
  labels:
    {{- include "uyuni-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys
  - contentprojects
  - organizations
  - repositories
  - uyuniproviders
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys/finalizers
  - contentprojects/finalizers
  - organizations/finalizers
  - repositories/finalizers
  - tasks/finalizers
  verbs:
  - update
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys/status
  - contentprojectpromotions/status
  - contentprojects/status
  - organizations/status
  - repositories/status
  - tasks/status
  - uyuniproviders/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - configchannels
  - softwarechannels
  - systemgroups
  - systems
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - contentprojectpromotions
  - tasks
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
