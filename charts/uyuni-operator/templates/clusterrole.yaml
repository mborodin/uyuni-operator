apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "uyuni-operator.fullname" . }}-manager
  labels:
    {{- include "uyuni-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys
  - autoinstalldistributions
  - autoinstallprofiles
  - clmenvironments
  - configurationchannels
  - contentprojects
  - custominfokeys
  - imageprofiles
  - organizations
  - repositories
  - softwarechannels
  - systemgroups
  - systems
  - uyuniproviders
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys/finalizers
  - autoinstalldistributions/finalizers
  - autoinstallprofiles/finalizers
  - clmenvironments/finalizers
  - configurationchannels/finalizers
  - contentprojects/finalizers
  - custominfokeys/finalizers
  - imageprofiles/finalizers
  - organizations/finalizers
  - repositories/finalizers
  - softwarechannels/finalizers
  - systemgroups/finalizers
  - systems/finalizers
  - tasks/finalizers
  verbs:
  - update
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - activationkeys/status
  - autoinstalldistributions/status
  - autoinstallprofiles/status
  - clmenvironments/status
  - configurationchannels/status
  - contentprojectpromotions/status
  - contentprojects/status
  - custominfokeys/status
  - imageprofiles/status
  - organizations/status
  - repositories/status
  - softwarechannels/status
  - systemgroups/status
  - systems/status
  - tasks/status
  - uyuniproviders/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - autoinstalldistributions
  - autoinstallprofiles
  - imageprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - imagestores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - uyuni.uyuni-project.org
  resources:
  - contentprojectpromotions
  - tasks
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
