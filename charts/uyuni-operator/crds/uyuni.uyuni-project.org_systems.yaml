---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: systems.uyuni.uyuni-project.org
spec:
  group: uyuni.uyuni-project.org
  names:
    kind: System
    listKind: SystemList
    plural: systems
    singular: system
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.minionId
      name: MinionID
      type: string
    - jsonPath: .status.uyuniServerId
      name: UyuniID
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.baseChannelLabel
      name: BaseChannel
      type: string
    - jsonPath: .status.lastCheckinTime
      name: LastCheckin
      type: date
    - jsonPath: .status.conditions[?(@.type=='BuildHost')].status
      name: BuildHost
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              addOns:
                description: |-
                  AddOns are additional entitlements granted to the system, e.g.
                  "virtualization_host", "container_build_host", "osimage_build_host",
                  "ansible_control_node", "monitoring_entitled".
                items:
                  type: string
                type: array
              adoptionTimeout:
                description: 'Defaulted by webhook: 24h if PreCreate, 30m otherwise.'
                type: string
              applyHighState:
                default: true
                description: |-
                  If true, schedule a Salt highstate run (system.scheduleApplyHighstate)
                  the first time the system completes registration and is fully
                  reconciled — applying all assigned states (channels, config channels,
                  formulas, etc.) immediately rather than waiting for the next scheduled
                  highstate.
                type: boolean
              baseChannelFrom:
                description: |-
                  ChannelFromProject references a channel produced by a ContentProject
                  environment. Resolution is structural: the realized Uyuni channel label
                  is {project.spec.label}-{environment}-{sourceChannelLabel}.

                  Verification at reconcile time additionally checks the channel exists in
                  the project's status.environmentStates[*].derivedChannels, which catches
                  the case where sourceChannelLabel names a channel that isn't actually a
                  source of the project.
                properties:
                  contentProjectRef:
                    description: |-
                      LocalObjectRef is a name-only reference to a CR in the same namespace.
                      We deliberately don't include namespace or kind: cross-namespace refs
                      complicate RBAC and aren't needed in our model, and each ref's kind is
                      implied by the field where it appears.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  environment:
                    pattern: ^[a-z0-9-]+$
                    type: string
                  sourceChannelLabel:
                    description: |-
                      SourceChannelLabel is the channel label as it exists upstream of the
                      project (i.e., what's attached as a source), not the derived label.
                    type: string
                required:
                - contentProjectRef
                - environment
                - sourceChannelLabel
                type: object
              baseChannelRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              childChannelRefs:
                items:
                  description: |-
                    LocalObjectRef is a name-only reference to a CR in the same namespace.
                    We deliberately don't include namespace or kind: cross-namespace refs
                    complicate RBAC and aren't needed in our model, and each ref's kind is
                    implied by the field where it appears.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              childChannelsFrom:
                items:
                  description: |-
                    ChannelFromProject references a channel produced by a ContentProject
                    environment. Resolution is structural: the realized Uyuni channel label
                    is {project.spec.label}-{environment}-{sourceChannelLabel}.

                    Verification at reconcile time additionally checks the channel exists in
                    the project's status.environmentStates[*].derivedChannels, which catches
                    the case where sourceChannelLabel names a channel that isn't actually a
                    source of the project.
                  properties:
                    contentProjectRef:
                      description: |-
                        LocalObjectRef is a name-only reference to a CR in the same namespace.
                        We deliberately don't include namespace or kind: cross-namespace refs
                        complicate RBAC and aren't needed in our model, and each ref's kind is
                        implied by the field where it appears.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    environment:
                      pattern: ^[a-z0-9-]+$
                      type: string
                    sourceChannelLabel:
                      description: |-
                        SourceChannelLabel is the channel label as it exists upstream of the
                        project (i.e., what's attached as a source), not the derived label.
                      type: string
                  required:
                  - contentProjectRef
                  - environment
                  - sourceChannelLabel
                  type: object
                type: array
              customInfo:
                additionalProperties:
                  type: string
                type: object
              deletionPolicy:
                default: Orphan
                enum:
                - Orphan
                - Delete
                type: string
              description:
                type: string
              hostname:
                description: |-
                  Hostname used in the pre-created profile. Defaults to minionId via
                  the SystemDefaulter mutating webhook.
                type: string
              minionId:
                description: Immutable after creation.
                type: string
              network:
                items:
                  properties:
                    ipAddress:
                      type: string
                    macAddress:
                      pattern: ^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$
                      type: string
                    name:
                      type: string
                  required:
                  - macAddress
                  - name
                  type: object
                type: array
              organizationRef:
                description: |-
                  LocalObjectRef is a name-only reference to a CR in the same namespace.
                  We deliberately don't include namespace or kind: cross-namespace refs
                  complicate RBAC and aren't needed in our model, and each ref's kind is
                  implied by the field where it appears.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              preCreate:
                description: |-
                  If true, create an empty system profile in Uyuni before the system
                  boots, so configuration applies on first registration. Requires at
                  least one of: network[].macAddress, hostname.
                type: boolean
            required:
            - minionId
            type: object
          status:
            properties:
              activeAddOns:
                items:
                  type: string
                type: array
              baseChannelLabel:
                type: string
              childChannelLabels:
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastCheckinTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - PreProvisioned
                - Registered
                - Reconciled
                type: string
              uyuniServerId:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
